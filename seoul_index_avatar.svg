<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Seoul Index avatar (@seoul-index.bsky.social). Red disc, cream 서울,
       ringed by 40 cream binary digits: a data ribbon that reads as data at any
       size, where real Seoul figures just read as noise. Bluesky crops to a
       circle. Site red #d70000, cream #f5f0e6. -->
