    <text x="200" y="50" transform="rotate(9 200 200)">0</text>
    <text x="200" y="50" transform="rotate(18 200 200)">1</text>
    <text x="200" y="50" transform="rotate(27 200 200)">1</text>
    <text x="200" y="50" transform="rotate(36 200 200)">0</text>
    <text x="200" y="50" transform="rotate(45 200 200)">0</text>
    <text x="200" y="50" transform="rotate(54 200 200)">0</text>
    <text x="200" y="50" transform="rotate(63 200 200)">1</text>
    <text x="200" y="50" transform="rotate(72 200 200)">0</text>
